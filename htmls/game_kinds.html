@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:linear-gradient(180deg,#b8e6f0 0%,#d4f0d4 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;

}

.top-bar{
  width:100%;max-width:420px;display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;
}
.level-title{
  font-size:1.4rem;font-weight:900;color:#4a3728;

  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.steps-left{
  font-size:1rem;color:#6b5344;font-weight:700;
  background:#fff;border-radius:14px;padding:5px 14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.timer-bar{
  width:100%;max-width:420px;padding:0 16px;margin-bottom:4px;
}
.timer-track{
  width:100%;height:10px;background:#e0d5c8;border-radius:5px;overflow:hidden;
}
.timer-fill{
  height:100%;border-radius:5px;transition:width 1s linear;
  background:linear-gradient(90deg,#4caf50,#8bc34a);
}
.timer-fill.warning{background:linear-gradient(90deg,#ff9800,#ffc107);}
.timer-fill.danger{background:linear-gradient(90deg,#f44336,#ff5722);}
.timer-text{
  text-align:center;font-size:1rem;font-weight:700;color:#5a3e2b;margin-top:2px;
}

/* Category slots */
.categories{
  width:100%;max-width:420px;padding:0 10px;
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  margin-bottom:12px;
}
.cat-slot{
  background:#fffbe6;border:2px solid #f0d48a;border-radius:12px;
  padding:8px 4px;text-align:center;min-height:120px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  transition:all 0.2s;position:relative;
}
.cat-slot.highlight{border-color:#ff9a56;background:#fff5eb;transform:scale(1.03);}
.cat-slot.complete{border-color:#4caf50;background:#e8f5e9;}
.cat-name{
  font-size:1rem;font-weight:900;color:#8b6914;
  margin-bottom:4px;white-space:nowrap;
}
.cat-count{
  font-size:0.7rem;color:#b89a4a;font-weight:700;margin-bottom:4px;
}
.cat-items{display:flex;flex-direction:column;gap:2px;}
.cat-item{
  font-size:1rem;color:#5a3e2b;background:#fff;
  border-radius:6px;padding:3px 5px;
  border:1px solid #e8dcc8;
}
.cat-item .poj{font-weight:700;color:#d35400;}
.cat-item{display:flex;align-items:center;gap:2px;}
.speak-btn{cursor:pointer;font-size:0.6rem;line-height:1;opacity:0.6;transition:opacity 0.2s;}
.speak-btn:hover{opacity:1;}

/* Word cards area */
.cards-area{
  width:100%;max-width:420px;padding:0 10px;
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  margin-top:8px;
}
.word-card{
  background:#fff;border:2.5px solid #e0d5c8;border-radius:12px;
  padding:10px 6px;text-align:center;cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  transition:all 0.2s;min-height:90px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.word-card:active{transform:scale(0.95);}
.word-card.selected{
  border-color:#ff6f61;background:#fff0ee;
  transform:scale(1.05);box-shadow:0 4px 16px rgba(255,111,97,0.3);
}
.word-card.correct-anim{
  animation:correctPop 0.5s ease;border-color:#4caf50;background:#e8f5e9;
}
.word-card.wrong-anim{animation:shake 0.4s ease;}
.word-card.hidden{opacity:0;pointer-events:none;transform:scale(0.8);}
.word-zh{font-size:1.5rem;font-weight:900;color:#5a3e2b;line-height:1.2;}
.word-poj{font-size:1rem;font-weight:700;color:#d35400;margin-top:3px;}

@keyframes correctPop{
  0%{transform:scale(1);}50%{transform:scale(1.15);}100%{transform:scale(0.8);opacity:0;}
}
@keyframes shake{
  0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}
}

/* Bottom bar */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:2px solid #e8dcc8;
  display:flex;justify-content:center;gap:20px;
  padding:10px 0 18px;z-index:50;
}
.action-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;

}
.action-btn .icon{
  width:44px;height:44px;border-radius:50%;

.action-btn .label{font-size:0.7rem;font-weight:700;color:#5a3e2b;}

.icon-undo{background:linear-gradient(135deg,#90caf9,#42a5f5);}
.icon-shuffle{background:linear-gradient(135deg,#a5d6a7,#66bb6a);}
.icon-skip{background:linear-gradient(135deg,#ef9a9a,#ef5350);}

/* Overlay */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:100;align-items:center;justify-content:center;
}
.overlay.show{display:flex;}
.popup{
  background:#fff;border-radius:24px;padding:35px 40px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);animation:popIn 0.4s ease;
  max-width:320px;width:90%;
}
@keyframes popIn{0%{transform:scale(0.5);opacity:0;}100%{transform:scale(1);opacity:1;}}
.popup h2{font-size:1.6rem;color:#5a3e2b;margin-bottom:8px;}
.popup .stars{font-size:2rem;margin-bottom:8px;}
.popup p{color:#8b6f5e;margin-bottom:16px;font-size:1.05rem;}
.popup-btn{
  padding:12px 36px;font-size:1rem;font-weight:700;color:#fff;
  background:linear-gradient(135deg,#ff9a56,#ff6f61);border:none;
  border-radius:30px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  box-shadow:0 4px 15px rgba(255,111,97,0.4);
  transition:transform 0.2s;
}
.popup-btn:hover{transform:translateY(-2px);}

/* Hint toast */
.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:rgba(0,0,0,0.8);color:#fff;padding:12px 24px;border-radius:12px;
  font-size:1.05rem;font-weight:700;z-index:200;
  transition:transform 0.3s ease;white-space:nowrap;
}
.toast.show{transform:translate(-50%,-50%) scale(1);}

.level-select{
  width:100%;max-width:420px;padding:20px;
}
.level-select h2{text-align:center;color:#4a3728;margin-bottom:16px;font-size:1.5rem;}
.level-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
}
.level-btn{
  background:#fff;border:3px solid #e0d5c8;border-radius:16px;
  padding:16px 8px;text-align:center;cursor:pointer;
  transition:all 0.2s;font-family:'Noto Sans TC',sans-serif;
}
.level-btn:hover{border-color:#ff9a56;transform:translateY(-2px);}
.level-btn .num{font-size:1.5rem;font-weight:900;color:#5a3e2b;}
.level-btn .desc{font-size:0.75rem;color:#8b6f5e;margin-top:4px;}
.level-btn.locked{opacity:0.4;pointer-events:none;}

@media(max-width:380px){
  .cat-name{font-size:0.9rem;}
  .word-zh{font-size:1.3rem;}
  .word-poj{font-size:0.9rem;}
  .cat-item{font-size:0.9rem;}
}

<script>
// === SOUND ENGINE (Web Audio API) ===
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new AudioCtx();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq, duration, type, vol){
  try{
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.type=type||'sine';
    osc.frequency.setValueAtTime(freq,ctx.currentTime);
    gain.gain.setValueAtTime(vol||0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+duration);
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start();osc.stop(ctx.currentTime+duration);
  }catch(e){}
}
function sfxCorrect(){
  playTone(523,0.1,'sine',0.25);
  setTimeout(()=>playTone(659,0.1,'sine',0.25),80);

}

// === LEADERBOARD (localStorage) ===
function getLeaderboard(levelIdx){
  try{
    const data=localStorage.getItem('taigi-rank-lv'+levelIdx);
    return data?JSON.parse(data):[];
  }catch(e){return [];}
}
function saveToLeaderboard(levelIdx, seconds, steps){
  const board=getLeaderboard(levelIdx);
  const now=new Date();
  const dateStr=(now.getMonth()+1)+'/'+now.getDate()+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  board.push({time:seconds, steps:steps, date:dateStr});
  board.sort((a,b)=>a.time-b.time);
  if(board.length>5) board.length=5;
  try{localStorage.setItem('taigi-rank-lv'+levelIdx,JSON.stringify(board));}catch(e){}
  return board;
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

        <div class="num">🏆</div>
        <div class="desc" style="font-weight:700;color:#5a3e2b;">排名模式</div>
        <div class="desc">拚最快紀錄！</div>
      </div>
    </div>
  </div>`;
  app.innerHTML=html;
}

function selectMode(mode){
  gameMode=mode;
  renderLevelSelect();
}

// === RENDER LEVEL SELECT ===
function renderLevelSelect(){
  clearInterval(timerInterval);
  currentLevel=-1;
  const isTimed=gameMode==='timed';
  const modeLabel=isTimed?'⏱️ 限時模式':'🏆 排名模式';
  let html=`<div class="level-select">
    <h2>台語分類卡牌</h2>
    <p style="text-align:center;color:#8b6f5e;margin-bottom:6px;">${modeLabel}</p>
    <p style="text-align:center;margin-bottom:16px;"><span onclick="renderModeSelect()" style="color:#d35400;cursor:pointer;font-size:0.85rem;font-weight:700;text-decoration:underline;">切換模式</span></p>
    <div class="level-grid">`;
  LEVELS.forEach((lv,i)=>{
    const themes = lv.categories.map(c=>c.name).join('、');
    let extra='';
    if(!isTimed){
      const board=getLeaderboard(i);
      if(board.length>0){
        const best=board[0];
        const bm=Math.floor(best.time/60);
        const bs=best.time%60;
        extra=`<div class="desc" style="color:#42a5f5;font-weight:700;">🥇 ${bm}:${String(bs).padStart(2,'0')}</div>`;
      }
    }
    html+=`<div class="level-btn" onclick="startLevel(${i})">
      <div class="num">${i+1}</div>
      <div class="desc">${themes}</div>
      ${extra}
    </div>`;
  });
  html+=`</div></div>`;
  app.innerHTML=html;
}

// === START LEVEL ===
function startLevel(idx){
  clearInterval(timerInterval);
  currentLevel=idx;
  const lv=LEVELS[idx];
  selectedCard=null;
  sortedItems={};
  undoStack=[];
  hintCount=3;
  lv.categories.forEach((_,i)=>sortedItems[i]=[]);

  // Flatten all items with catIdx
  let allItems=[];
  lv.categories.forEach((cat,ci)=>{
    cat.items.forEach(item=>{
      allItems.push({...item, catIdx:ci});
    });
  });
  remainingCards=shuffle(allItems);

  if(gameMode==='timed'){
    // Timed mode: countdown
    stepsLeft=lv.maxSteps;
    timeLimit=lv.timeLimit||90;
    timeLeft=timeLimit;
    elapsedTime=0;
    renderGame();
    timerInterval=setInterval(()=>{
      timeLeft--;
      if(timeLeft<=10 && timeLeft>0 && soundOn) sfxTick();
      updateTimerUI();
      if(timeLeft<=0){
        clearInterval(timerInterval);
        if(soundOn) sfxFail();
        showPopup('時間到！','⏰','再挑戰一次吧！','重新挑戰',()=>startLevel(currentLevel));
      }
    },1000);
  } else {
    // Ranking mode: count up, no step limit
    stepsLeft=999;
    timeLimit=0;
    timeLeft=0;
    elapsedTime=0;
    renderGame();
    timerInterval=setInterval(()=>{
      elapsedTime++;
      updateTimerUI();
    },1000);
  }
}

function updateTimerUI(){
  const fill=document.getElementById('timer-fill');
  const text=document.getElementById('timer-text');
  if(!fill||!text) return;
  if(gameMode==='timed'){
    const pct=(timeLeft/timeLimit)*100;
    fill.style.width=pct+'%';
    fill.className='timer-fill';
    if(pct<=20) fill.classList.add('danger');
    else if(pct<=40) fill.classList.add('warning');
    const m=Math.floor(timeLeft/60);
    const s=timeLeft%60;
    text.textContent=m+':'+String(s).padStart(2,'0');
  } else {
    // Ranking mode: timer counts up, bar fills up gradually
    fill.style.width='100%';
    fill.className='timer-fill';
    fill.style.background='linear-gradient(90deg,#42a5f5,#1e88e5)';
    const m=Math.floor(elapsedTime/60);
    const s=elapsedTime%60;
    text.textContent=m+':'+String(s).padStart(2,'0');
  }
}

// === RENDER GAME ===
function renderGame(){
  const lv=LEVELS[currentLevel];
  let html=``;

  // Top bar
  let timerDisplay, fillStyle, fillPct;
  if(gameMode==='timed'){
    const tm=Math.floor(timeLeft/60);
    const ts=timeLeft%60;
    fillPct=(timeLeft/timeLimit)*100;
    let fillClass='timer-fill';
    if(fillPct<=20) fillClass+=' danger'; else if(fillPct<=40) fillClass+=' warning';
    fillStyle=`class="${fillClass}" style="width:${fillPct}%"`;
    timerDisplay=`步數：${stepsLeft} ｜ <span id="timer-text">${tm}:${String(ts).padStart(2,'0')}</span>`;
  } else {
    const em=Math.floor(elapsedTime/60);
    const es=elapsedTime%60;
    fillStyle=`class="timer-fill" style="width:100%;background:linear-gradient(90deg,#42a5f5,#1e88e5)"`;
    timerDisplay=`🏆 <span id="timer-text">${em}:${String(es).padStart(2,'0')}</span>`;
  }
  html+=`<div class="top-bar">
    <span class="level-title">${lv.title}</span>
    <span class="steps-left">${timerDisplay}</span>
  </div>
  <div class="timer-bar">
    <div class="timer-track"><div ${fillStyle} id="timer-fill"></div></div>
  </div>`;

  // Categories
  html+=`<div class="categories">`;
  lv.categories.forEach((cat,ci)=>{
    const sorted=sortedItems[ci]||[];
    const total=cat.items.length;
    const done=sorted.length;
    const isComplete=done===total;
    html+=`<div class="cat-slot ${isComplete?'complete':''}" data-cat="${ci}" onclick="selectCategory(${ci})">
      <div class="cat-name">${cat.name}</div>
      <div class="cat-count">${done}/${total}</div>
      <div class="cat-items">`;
    sorted.forEach(item=>{
      const hasAudio = AUDIO_MAP[item.zh] ? true : false;
      const speakerBtn = hasAudio ? `<span class="speak-btn" onclick="event.stopPropagation();playPronunciation('${item.zh}')">&#x1F50A;</span>` : '';
      html+=`<div class="cat-item">${speakerBtn}<span class="poj">${item.poj}</span> ${item.zh}</div>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;

  // Word cards
  html+=`<div class="cards-area">`;
  remainingCards.forEach((card,i)=>{
    html+=`<div class="word-card" id="wc-${i}" data-idx="${i}" onclick="selectCard(${i})">
      <div class="word-zh">${card.zh}</div>
      <div class="word-poj">${card.poj}</div>
    </div>`;
  });
  html+=`</div>`;

  // Bottom bar
  html+=`<div class="bottom-bar">
    <button class="action-btn" onclick="useHint()">
      <div class="icon icon-hint">💡</div>
      <div class="label">提示(${hintCount})</div>
    </button>
    <button class="action-btn" onclick="useUndo()">
      <div class="icon icon-undo">↩️</div>
      <div class="label">撤回</div>
    </button>
    <button class="action-btn" onclick="reshuffleCards()">
      <div class="icon icon-shuffle">🔀</div>
      <div class="label">重新整理</div>
    </button>
    <button class="action-btn" onclick="toggleSound()">
      <div class="icon" style="background:linear-gradient(135deg,#ce93d8,#ab47bc)">${soundOn?'🔊':'🔇'}</div>
      <div class="label">${soundOn?'音效開':'音效關'}</div>
    </button>
    <button class="action-btn" onclick="clearInterval(timerInterval);renderModeSelect()">
      <div class="icon icon-skip">🏠</div>
      <div class="label">選關</div>
    </button>
  </div>`;

  app.innerHTML=html;
}

// === TOGGLE SOUND ===
function toggleSound(){
  soundOn=!soundOn;
  renderGame();
}

// === SELECT CARD ===
function selectCard(idx){
  if(selectedCard===idx){
    selectedCard=null;
    renderGame();
    return;
  }
  selectedCard=idx;
  // Play Taiwanese pronunciation when card is tapped
  if(soundOn){
    const card=remainingCards[idx];
    if(card) playPronunciation(card.zh);
  }
  // Highlight selected
  document.querySelectorAll('.word-card').forEach(el=>el.classList.remove('selected'));
  const el=document.getElementById('wc-'+idx);
  if(el) el.classList.add('selected');
  // Highlight categories
  document.querySelectorAll('.cat-slot').forEach(el=>el.classList.add('highlight'));
}

// === SELECT CATEGORY ===
function selectCategory(catIdx){
  if(selectedCard===null) return;
  const card=remainingCards[selectedCard];
  const lv=LEVELS[currentLevel];

  if(card.catIdx===catIdx){
    // Correct! 只有放對才扣步數
    stepsLeft--;
    if(soundOn) sfxCorrect();
    const el=document.getElementById('wc-'+selectedCard);
    if(el){el.classList.add('correct-anim');}
    sortedItems[catIdx].push({zh:card.zh,poj:card.poj});
    undoStack.push({cardIdx:selectedCard, card:{...card}, catIdx});
    const removedIdx=selectedCard;
    selectedCard=null;
    setTimeout(()=>{
      remainingCards.splice(removedIdx,1);
      checkWin();
      renderGame();
    },700);
  } else {
    // Wrong - 不扣步數，卡片保持 selected 讓使用者直接改點分類
    if(soundOn) sfxWrong();
    const cardEl=document.getElementById('wc-'+selectedCard);
    if(cardEl){cardEl.classList.add('wrong-anim');}
    // 同時讓被點錯的分類閃一下，方便辨識
    const catEl=document.querySelectorAll('.cat-slot')[catIdx];
    if(catEl){catEl.classList.add('wrong-anim');}
    showToast(`「${card.zh}」不是「${lv.categories[catIdx].name}」喔，閣揀一擺！`,3000);
    setTimeout(()=>{
      if(cardEl){cardEl.classList.remove('wrong-anim');}
      if(catEl){catEl.classList.remove('wrong-anim');}
    },500);
  }
}

// === CHECK WIN ===
function checkWin(){
  if(remainingCards.length===0){ // 全部分類完成才過關
    clearInterval(timerInterval);
    if(soundOn) sfxWin();
    const lv=LEVELS[currentLevel];
    const nextExists=currentLevel+1<LEVELS.length;

    if(gameMode==='timed'){
      const ratio=stepsLeft/lv.maxSteps;
      const timeUsed=timeLimit-timeLeft;
      let stars='⭐⭐⭐';
      if(ratio<0.2) stars='⭐';
      else if(ratio<0.4) stars='⭐⭐';
      const tm=Math.floor(timeUsed/60);
      const ts=timeUsed%60;
      showPopup(
        '過關！',stars,
        `用了 ${lv.maxSteps-stepsLeft+1} 步、${tm}:${String(ts).padStart(2,'0')} 完成！`,
        nextExists?'下一關':'回選單',
        ()=>nextExists?startLevel(currentLevel+1):renderLevelSelect()
      );
    } else {
      // Ranking mode: save score and show leaderboard
      const totalSteps=999-stepsLeft+1;
      const board=saveToLeaderboard(currentLevel, elapsedTime, totalSteps);
      const em=Math.floor(elapsedTime/60);
      const es=elapsedTime%60;
      // Find rank of this run
      const rank=board.findIndex(b=>b.time===elapsedTime && b.steps===totalSteps)+1;
      const rankEmojis=['','🥇','🥈','🥉','4️⃣','5️⃣'];
      showRankingPopup(currentLevel, elapsedTime, totalSteps, board, rank, nextExists);
    }
  } else if(stepsLeft<=0 && gameMode==='timed'){
    clearInterval(timerInterval);
    if(soundOn) sfxFail();
    showPopup('步數用完了','😅','再挑戰一次吧！','重新挑戰',()=>startLevel(currentLevel));
  }
}

// === RANKING POPUP ===
function showRankingPopup(levelIdx, seconds, steps, board, rank, nextExists){
  const em=Math.floor(seconds/60);
  const es=seconds%60;
  const rankEmojis=['','🥇','🥈','🥉','4️⃣','5️⃣'];
  let boardHtml='<div style="text-align:left;margin:12px 0;">';
  board.forEach((entry,i)=>{
    const m=Math.floor(entry.time/60);
    const s=entry.time%60;
    const isCurrent=(entry.time===seconds && entry.steps===steps && i===rank-1);
    const style=isCurrent?'background:#fff3e0;border-radius:8px;padding:4px 8px;font-weight:700;':'padding:4px 8px;';
    boardHtml+=`<div style="${style}font-size:0.9rem;color:#5a3e2b;">
      ${rankEmojis[i+1]||'　'} ${m}:${String(s).padStart(2,'0')} （${entry.steps}步）
      <span style="color:#aaa;font-size:0.75rem;">${entry.date}</span>
      ${isCurrent?'⬅ NOW':''}
    </div>`;
  });
  boardHtml+='</div>';

  document.getElementById('popupTitle').textContent='過關！';
  document.getElementById('popupStars').textContent=rankEmojis[rank]||'🏆';
  document.getElementById('popupMsg').innerHTML=
    `<div style="font-size:1rem;font-weight:700;color:#5a3e2b;margin-bottom:4px;">${em}:${String(es).padStart(2,'0')} 完成！（${steps}步）</div>`+
    `<div style="font-size:0.85rem;color:#d35400;font-weight:700;margin-bottom:8px;">第 ${rank} 名！</div>`+
    `<div style="font-size:0.85rem;color:#8b6f5e;font-weight:700;">🏆 排行榜 — 第 ${levelIdx+1} 關</div>`+
    boardHtml;
  const btn=document.getElementById('popupBtn');
  btn.textContent=nextExists?'下一關':'回選單';
  btn.onclick=()=>{
    document.getElementById('overlay').classList.remove('show');
    if(nextExists) startLevel(currentLevel+1); else renderLevelSelect();
  };
  document.getElementById('overlay').classList.add('show');
}

// === HINT ===
function useHint(){
  if(hintCount<=0){showToast('提示用完了！');return;}
  if(remainingCards.length===0) return;
  hintCount--;
  const card=remainingCards[0];
  const lv=LEVELS[currentLevel];
  const catName=lv.categories[card.catIdx].name;
  showToast(`💡「${card.zh}」屬於「${catName}」`,1800);
  renderGame();
}

// === UNDO ===
function useUndo(){
  if(undoStack.length===0){showToast('無法撤回');return;}
  const last=undoStack.pop();
  sortedItems[last.catIdx].pop();
  remainingCards.splice(last.cardIdx,0,last.card);
  stepsLeft++;
  selectedCard=null;
  renderGame();
  showToast('已撤回 ↩️');
}

// === RESHUFFLE ===
function reshuffleCards(){
  remainingCards=shuffle(remainingCards);
  selectedCard=null;
  renderGame();
  showToast('重新整理完成！');
}

// === INIT ===
renderModeSelect();

</script>

</body>
</html>
