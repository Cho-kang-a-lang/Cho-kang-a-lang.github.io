<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>做工á人台語工作室 - 文章閱讀</title>

    <!-- SEO: 描述（由 JS 依文章內容動態覆寫） -->
    <meta name="description" content="做工á人台語工作室 — 台語廣播劇、有聲故事、台語詞典 Podcast 文字稿，免費線上閱讀。">
    <meta name="author" content="做工á人台語工作室">

    <!-- Open Graph（由 JS 依文章內容動態覆寫） -->
    <meta property="og:type"        content="article">
    <meta property="og:url"         content="https://cho-kang-a-lang.github.io/article.html">
    <meta property="og:title"       content="做工á人台語工作室">
    <meta property="og:description" content="台語廣播劇、有聲故事、台語詞典 Podcast 文字稿。">
    <meta property="og:image"       content="https://cho-kang-a-lang.github.io/images/logo.png">
    <meta property="og:image:alt"   content="做工á人台語工作室">
    <meta property="og:locale"      content="zh_TW">
    <meta property="og:site_name"   content="做工á人台語工作室">

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:title"       content="做工á人台語工作室">
    <meta name="twitter:description" content="台語廣播劇、有聲故事、台語詞典 Podcast 文字稿。">
    <meta name="twitter:image"       content="https://cho-kang-a-lang.github.io/images/logo.png">

    <!-- Canonical（由 JS 依文章動態覆寫） -->
    <link rel="canonical" href="https://cho-kang-a-lang.github.io/article.html">

    <!-- 設定網站 Favicon -->
    <link rel="icon" href="./images/logo.png" type="image/png">

    <!-- 載入 marked.js 用來解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- 引入外部共用 CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- 載入 Font Awesome 圖示庫 (搜尋與設定按鈕使用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- 載入特殊字體: 粉圓體 (jf-openhuninn) 與 芫荽體 (Iansui) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jf-openhuninn@1.1/jf-openhuninn.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/iansui@0.9.1/dist/Iansui-Regular.min.css">

    <!-- 從 markdown frontmatter 自動載入文章的共用工具 -->
    <script src="posts-loader.js"></script>

    <!-- 搜尋模態框與設定模態框的專屬樣式 -->
    <style>
        /* 導覽列右側功能按鈕 */
        .nav-actions { display: flex; align-items: center; gap: 15px; margin-left: 15px; }
        .nav-btn { background: none; border: none; font-size: 1.2rem; color: var(--text-main); cursor: pointer; transition: color 0.2s; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { color: var(--primary-color); }

        /* 模態框 (Modal) 樣式 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-content { background: var(--white); padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: var(--shadow-lg); }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 1.5rem; cursor: pointer; border: none; background: none; color: var(--text-muted); transition: color 0.2s; }
        .modal-close:hover { color: #ef4444; }
        
        .modal-title { font-size: 1.5rem; margin-bottom: 20px; color: var(--text-main); border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }

        /* 設定選單樣式 */
        .setting-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .setting-group label { font-weight: 500; font-size: 1rem; color: var(--text-main); }
        .setting-group input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 6px; cursor: pointer; padding: 0; }
        .setting-group input[type="range"] { width: 100%; cursor: pointer; }
        .setting-group select { padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); font-size: 1rem; background: var(--bg-color); color: var(--text-main); cursor: pointer; }
        .reset-btn { width: 100%; padding: 12px; background: var(--border-color); color: var(--text-muted); border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .reset-btn:hover { background: #475569; color: var(--text-main); }

        /* 搜尋樣式 */
        .search-input-wrapper { display: flex; position: relative; margin-bottom: 20px; }
        .search-input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        #search-input { width: 100%; padding: 12px 15px 12px 40px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 1rem; outline: none; transition: border-color 0.2s; background: var(--bg-color); color: var(--text-main); }
        #search-input:focus { border-color: var(--primary-color); }

        .search-result-item { padding: 12px 0; border-bottom: 1px solid var(--border-color); }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-title { color: var(--primary-color); font-weight: 600; font-size: 1.1rem; display: block; margin-bottom: 5px; }
        .search-result-title:hover { color: var(--primary-hover); text-decoration: underline; }
        .search-result-meta { font-size: 0.85rem; color: var(--text-muted); }

        /* 深色/淺色主題切換按鈕 */
        .theme-switcher { display: flex; gap: 8px; margin-top: 4px; }
        .theme-btn { flex: 1; padding: 10px 8px; border: 1px solid var(--border-color); border-radius: 6px; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .theme-btn.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); font-weight: 600; }
        .theme-btn:hover:not(.active) { border-color: var(--primary-color); color: var(--text-main); }
    </style>
</head>
<body class="article-page">

    <!-- 套用使用者自訂設定的初始化腳本 (必須放在 body 最前面以避免畫面閃爍) -->
    <script>
        const DARK_DEFAULTS = { bg: '#0f172a', text: '#e2e8f0' };
        const LIGHT_DEFAULTS = { bg: '#f8fafc', text: '#1e293b' };
        function applyUserSettings() {
            const theme = localStorage.getItem('site_theme') || 'dark';
            const defaults = theme === 'light' ? LIGHT_DEFAULTS : DARK_DEFAULTS;
            const bg = localStorage.getItem('site_bg') || defaults.bg;
            const color = localStorage.getItem('site_color') || defaults.text;
            const fsize = localStorage.getItem('site_fsize');
            const ffamily = localStorage.getItem('site_ffamily');

            // 設定 data-theme 屬性以觸發 CSS 淺/深色覆蓋 (white、border、muted、shadows)
            document.documentElement.setAttribute('data-theme', theme);

            // 套用背景色與字體色 (同時設定在 html 與 body，防止 article-page class 覆蓋)
            [document.documentElement, document.body].forEach(el => {
                el.style.setProperty('--bg-color', bg);
                el.style.setProperty('--text-main', color);
            });

            if (fsize) document.documentElement.style.fontSize = fsize + 'px';
            else document.documentElement.style.fontSize = '';
            if (ffamily) document.body.style.fontFamily = ffamily;
            else document.body.style.fontFamily = '';
        }
        applyUserSettings();
    </script>

    <!-- 頂部導覽列 -->
    <header class="navbar">
        <a href="index.html" class="nav-brand">
            <img src="./images/logo.png" alt="做工á人 Logo">
            做工á人台語工作室
        </a>
        
        <!-- Navbar 右側：選單容器與新功能按鈕 -->
        <div style="display: flex; align-items: center;">
            <nav id="menu-container">
                <span class="status-msg" style="padding:0;">載入中...</span>
            </nav>
            
            <div class="nav-actions">
                <button class="nav-btn" id="open-search-btn" title="搜尋文章"><i class="fa fa-search"></i></button>
                <button class="nav-btn" id="open-settings-btn" title="網站外觀設定"><i class="fa fa-cog"></i></button>
            </div>
            
            <button class="mobile-toggle" id="mobile-toggle" style="margin-left: 15px;">☰</button>
        </div>
    </header>

    <main class="article-wrapper">
        <a href="javascript:history.back()" class="back-btn">← 返回上一頁</a>
        
        <div class="article-card">
            <nav id="breadcrumb-container" class="breadcrumb" style="display: none;"></nav>

            <header class="article-header" id="article-header" style="display: none;">
                <h1 class="article-title" id="article-title"></h1>
                <div class="article-meta" id="article-meta">
                    <span id="article-date"></span>
                </div>
            </header>
            
            <article id="markdown-content" class="markdown-body">
                <div class="status-msg">內容載入中...</div>
            </article>

            <nav id="post-navigation" class="post-navigation" style="display: none;">
            </nav>
        </div>
    </main>

    <footer class="footer">
        <p>© 2023 做工á人. All rights reserved. | 致力於台語文化推廣</p>
        <p style="margin-top:12px;">
            <img src="https://hits.sh/cho-kang-a-lang.github.io.svg?style=flat-square&label=%E7%B8%BD%E7%80%8F%E8%A6%BD%E6%AC%A1%E6%95%B8&color=24BF89&labelColor=334155" alt="總瀏覽次數" style="vertical-align:middle;">
        </p>
    </footer>

    <!-- ================= 模態框 (Modals) 區塊 ================= -->
    
    <!-- 1. 搜尋模態框 -->
    <div id="search-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="close-search-btn">&times;</button>
            <h2 class="modal-title">搜尋文章</h2>
            <div class="search-input-wrapper">
                <i class="fa fa-search"></i>
                <input type="text" id="search-input" placeholder="請輸入關鍵字 (如：A郎, 故事)..." autocomplete="off">
            </div>
            <div id="search-results">
                <div style="color: var(--text-muted); font-size: 0.95rem; text-align: center;">請在上方輸入關鍵字開始搜尋</div>
            </div>
        </div>
    </div>

    <!-- 2. 設定模態框 -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="close-settings-btn">&times;</button>
            <h2 class="modal-title">網站外觀設定</h2>

            <div class="setting-group">
                <label>色彩主題</label>
                <div class="theme-switcher">
                    <button class="theme-btn" data-theme="dark"><i class="fa fa-moon"></i> 深色模式</button>
                    <button class="theme-btn" data-theme="light"><i class="fa fa-sun"></i> 淺色模式</button>
                </div>
            </div>

            <div class="setting-group">
                <label for="set-bg-color">背景顏色</label>
                <input type="color" id="set-bg-color" value="#0f172a">
            </div>

            <div class="setting-group">
                <label for="set-text-color">字體顏色</label>
                <input type="color" id="set-text-color" value="#e2e8f0">
            </div>

            <div class="setting-group">
                <label for="set-font-size">字體大小: <span id="font-size-val">16px</span></label>
                <input type="range" id="set-font-size" min="14" max="24" value="16" step="1">
            </div>

            <div class="setting-group">
                <label for="set-font-family">網站字型</label>
                <select id="set-font-family">
                    <option value="">預設 (系統字體)</option>
                    <option value="'jf-openhuninn', sans-serif">粉圓體 (圓潤可愛)</option>
                    <option value="'Iansui', serif">芫荽體 (硬筆手寫)</option>
                </select>
            </div>

            <button class="reset-btn" id="reset-settings-btn">還原預設值</button>
        </div>
    </div>

    <!-- ================= JavaScript 邏輯區塊 ================= -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const fileName = urlParams.get('file');

            const menuContainer = document.getElementById('menu-container');
            const mobileToggle = document.getElementById('mobile-toggle');
            
            window.currentPostIndex = -1; 
            let flatPosts = [];
            let breadcrumbPath = [];
            let allArticlesForSearch = []; // 用於儲存全站文章以供搜尋

            // 載入 posts.json 並自動從 markdown frontmatter 注入文章
            loadPostsData()
                .then(data => {
                    menuContainer.innerHTML = '';
                    if (!data.menu || data.menu.length === 0) return;

                    // --- 建立無限層級選單 ---
                    function buildMenu(items, level) {
                        const ul = document.createElement('ul');
                        let hasAnySub = items.some(item => item.children && item.children.length > 0);
                        
                        if (level === 0) { ul.className = 'nav-list'; ul.id = 'nav-list'; } 
                        else if (level === 1) { ul.className = 'dropdown-menu'; } 
                        else { ul.className = 'sub-dropdown-menu'; }

                        if (level > 0 && !hasAnySub) ul.classList.add('scrollable-menu');

                        items.forEach(item => {
                            const li = document.createElement('li');
                            li.className = level === 0 ? 'nav-item' : 'dropdown-item';
                            
                            const hasChildren = item.children && item.children.length > 0;
                            if (hasChildren && level > 0) li.classList.add('has-sub');

                            const linkClass = level === 0 ? 'nav-link' : 'dropdown-link';
                            let targetUrl = '#';
                            if (item.file === 'home') targetUrl = 'index.html';
                            else if (hasChildren) targetUrl = `category.html?cat=${encodeURIComponent(item.title)}`;
                            else if (item.file) targetUrl = `article.html?file=${item.file}`;

                            let arrow = '';
                            if (hasChildren) {
                                arrow = level === 0 
                                    ? '<span class="arrow" style="font-size:0.8em; margin-left:5px; transition:transform 0.3s; display:inline-block;">▼</span>' 
                                    : '<span class="arrow" style="margin-left:10px; transition:transform 0.3s; display:inline-block;">▶</span>';
                            }
                            
                            li.innerHTML = `<a href="${targetUrl}" class="${linkClass}">${item.title}${arrow}</a>`;

                            if (hasChildren) {
                                const childUl = buildMenu(item.children, level + 1);
                                li.appendChild(childUl);

                                li.querySelector('a').addEventListener('click', function(e) {
                                    if (window.innerWidth <= 768) {
                                        e.preventDefault(); 
                                        const siblings = li.parentElement.children;
                                        for (let sibling of siblings) {
                                            if (sibling !== li && sibling.querySelector('ul')) {
                                                sibling.querySelector('ul').classList.remove('mobile-open');
                                                const siblingArrow = sibling.querySelector('.arrow');
                                                if (siblingArrow) siblingArrow.style.transform = 'rotate(0deg)';
                                            }
                                        }
                                        childUl.classList.toggle('mobile-open');
                                        const arrowSpan = this.querySelector('.arrow');
                                        if (arrowSpan) {
                                            if (level === 0) arrowSpan.style.transform = childUl.classList.contains('mobile-open') ? 'rotate(180deg)' : 'rotate(0deg)';
                                            else arrowSpan.style.transform = childUl.classList.contains('mobile-open') ? 'rotate(90deg)' : 'rotate(0deg)';
                                        }
                                    }
                                });
                            }
                            ul.appendChild(li);
                        });
                        return ul;
                    }

                    menuContainer.appendChild(buildMenu(data.menu, 0));

                    mobileToggle.addEventListener('click', function() {
                        const nav = document.getElementById('nav-list');
                        if (nav) {
                            nav.classList.toggle('active');
                            this.textContent = nav.classList.contains('active') ? '✖' : '☰';
                        }
                    });

                    // --- 分析分類結構，找出當前文章的「麵包屑」與「前後篇文章」 ---
                    function flattenAndFind(items, pathSoFar) {
                        for (let item of items) {
                            let currentPath = [...pathSoFar, { title: item.title, file: item.file }];
                            if (item.file && item.file !== 'home') {
                                flatPosts.push({ ...item, path: currentPath });
                                if (item.file === fileName) {
                                    window.currentPostIndex = flatPosts.length - 1;
                                    breadcrumbPath = currentPath;
                                }
                            }
                            if (item.children) {
                                flattenAndFind(item.children, currentPath);
                            }
                        }
                    }
                    flattenAndFind(data.menu, []);

                    // --- 為了搜尋功能，直接使用從 frontmatter 讀取的文章清單 ---
                    allArticlesForSearch = (data._posts || []).filter(
                        p => p.title && p.file !== 'home' && p.file !== 'archives'
                    );

                    // --- 渲染文章頁面的導覽 ---
                    if (window.currentPostIndex !== -1) {
                        const currentPost = flatPosts[window.currentPostIndex];
                        
                        let breadcrumbHtml = `<a href="index.html">首頁</a>`;
                        breadcrumbPath.forEach((node, idx) => {
                            if (idx > 0 && idx < breadcrumbPath.length - 1) { 
                                breadcrumbHtml += `<span class="breadcrumb-separator">/</span> <a href="category.html?cat=${encodeURIComponent(node.title)}">${node.title}</a>`;
                            }
                        });
                        breadcrumbHtml += `<span class="breadcrumb-separator">/</span> <span>${currentPost.title}</span>`;
                        document.getElementById('breadcrumb-container').innerHTML = breadcrumbHtml;
                        document.getElementById('breadcrumb-container').style.display = 'flex';

                        document.getElementById('article-title').textContent = currentPost.title;
                        
                        // 強化日期相容性處理
                        let dateHtmlText = '';
                        if (currentPost.date) {
                            let dObj = new Date(String(currentPost.date).replace(/-/g, '/'));
                            if (!isNaN(dObj.getTime())) {
                                dateHtmlText = `📅 發布日期：${dObj.getFullYear()}-${String(dObj.getMonth() + 1).padStart(2, '0')}-${String(dObj.getDate()).padStart(2, '0')}`;
                            }
                        }
                        
                        if (fileName === 'archives' || !dateHtmlText) {
                            document.getElementById('article-date').style.display = 'none'; 
                        } else {
                            document.getElementById('article-date').innerHTML = dateHtmlText;
                        }
                        
                        document.getElementById('article-header').style.display = 'block';
                        document.title = `${currentPost.title} - 做工á人台語工作室`;

                        // 動態更新 SEO meta & Open Graph
                        const pageUrl  = `https://cho-kang-a-lang.github.io/article.html?file=${fileName}`;
                        // 修正：posts-loader 存的欄位是 image，不是 img
                        const imgUrl   = currentPost.image
                            ? `https://cho-kang-a-lang.github.io/${currentPost.image.replace(/^\.\//, '')}`
                            : 'https://cho-kang-a-lang.github.io/images/logo.png';
                        // 優先使用文章摘要 excerpt，比 description 欄位更完整
                        const fullMeta = (data._posts || []).find(p => p.file === fileName);
                        const excerpt  = fullMeta?.excerpt || '';
                        const desc     = excerpt || currentPost.description || '台語廣播劇、有聲故事、台語詞典 Podcast 文字稿。';
                        const setMeta  = (sel, val) => { const el = document.querySelector(sel); if (el) el.setAttribute('content', val); };
                        setMeta('meta[name="description"]',          `${currentPost.title} — ${desc}`);
                        setMeta('meta[property="og:url"]',           pageUrl);
                        setMeta('meta[property="og:title"]',         `${currentPost.title} - 做工á人台語工作室`);
                        setMeta('meta[property="og:description"]',   desc);
                        setMeta('meta[property="og:image"]',         imgUrl);
                        setMeta('meta[property="og:image:alt"]',     currentPost.title);
                        setMeta('meta[name="twitter:title"]',        `${currentPost.title} - 做工á人台語工作室`);
                        setMeta('meta[name="twitter:description"]',  desc);
                        setMeta('meta[name="twitter:image"]',        imgUrl);
                        // 更新 canonical
                        const canonical = document.querySelector('link[rel="canonical"]');
                        if (canonical) canonical.setAttribute('href', pageUrl);

                        // 動態注入 JSON-LD 結構化資料（Article schema）
                        const existingLd = document.getElementById('ld-article');
                        if (existingLd) existingLd.remove();
                        const ldScript = document.createElement('script');
                        ldScript.id   = 'ld-article';
                        ldScript.type = 'application/ld+json';
                        const ldData  = {
                            "@context":         "https://schema.org",
                            "@type":            "Article",
                            "headline":         currentPost.title,
                            "description":      desc,
                            "image":            imgUrl,
                            "url":              pageUrl,
                            "inLanguage":       "zh-Hant",
                            "publisher": {
                                "@type": "Organization",
                                "name":  "做工仔人台語工作室",
                                "logo": {
                                    "@type": "ImageObject",
                                    "url":   "https://cho-kang-a-lang.github.io/images/logo.png"
                                }
                            },
                            "mainEntityOfPage": {
                                "@type": "WebPage",
                                "@id":   pageUrl
                            }
                        };
                        if (currentPost.date) ldData.datePublished = currentPost.date;
                        ldScript.textContent = JSON.stringify(ldData);
                        document.head.appendChild(ldScript);

                        // 每篇文章個別瀏覽計數
                        if (fileName !== 'archives' && fileName !== 'donate') {
                            const badge = document.createElement('span');
                            badge.style.cssText = 'display:inline-block; margin-top:8px;';
                            badge.innerHTML = `<img src="https://hits.sh/cho-kang-a-lang.github.io/${fileName}.svg?style=flat-square&label=%E6%9C%AC%E7%AF%87%E7%80%8F%E8%A6%BD&color=24BF89&labelColor=334155" alt="本篇瀏覽次數" style="vertical-align:middle;">`;
                            document.getElementById('article-meta').appendChild(badge);
                        }

                        if (fileName !== 'archives') {
                            const prevPost = window.currentPostIndex > 0 ? flatPosts[window.currentPostIndex - 1] : null;
                            const nextPost = window.currentPostIndex < flatPosts.length - 1 ? flatPosts[window.currentPostIndex + 1] : null;

                            let navHtml = '';
                            if (prevPost && prevPost.file !== 'archives') {
                                navHtml += `<a href="article.html?file=${prevPost.file}" class="nav-link-block prev">
                                    <span class="nav-label">« 上一篇文章</span>
                                    <span class="nav-title">${prevPost.title}</span>
                                </a>`;
                            } else {
                                navHtml += `<div class="nav-link-block" style="visibility:hidden;"></div>`;
                            }

                            if (nextPost && nextPost.file !== 'archives') {
                                navHtml += `<a href="article.html?file=${nextPost.file}" class="nav-link-block next">
                                    <span class="nav-label">下一篇文章 »</span>
                                    <span class="nav-title">${nextPost.title}</span>
                                </a>`;
                            } else {
                                navHtml += `<div class="nav-link-block" style="visibility:hidden;"></div>`;
                            }
                            
                            document.getElementById('post-navigation').innerHTML = navHtml;
                            document.getElementById('post-navigation').style.display = 'flex';
                        }
                    }

                })
                .catch(error => {
                    console.error('Menu parsing error:', error);
                })
                .finally(() => {
                    // --- 渲染 Markdown 或 Archives 時間軸 ---
                    const contentDiv = document.getElementById('markdown-content');
                    
                    if (fileName === 'archives') {
                        contentDiv.classList.remove('markdown-body');

                        // 使用含有完整 metadata（含摘要、圖片）的 allArticlesForSearch
                        let validPosts = allArticlesForSearch.filter(
                            p => p.categories && p.categories.length > 0
                        );

                        // 按日期排序（新的在前）
                        validPosts.sort((a, b) => {
                            const dA = a.date ? new Date(String(a.date).replace(/-/g, '/')).getTime() : 0;
                            const dB = b.date ? new Date(String(b.date).replace(/-/g, '/')).getTime() : 0;
                            return (isNaN(dB) ? 0 : dB) - (isNaN(dA) ? 0 : dA);
                        });

                        if (validPosts.length === 0) {
                            contentDiv.innerHTML = '<div class="status-msg">目前沒有任何文章紀錄。</div>';
                        } else {
                            // 預先統計各年份文章數
                            const yearCount = {};
                            validPosts.forEach(post => {
                                const d = post.date ? new Date(String(post.date).replace(/-/g, '/')) : null;
                                const y = (d && !isNaN(d.getTime())) ? String(d.getFullYear()) : '未標示年份';
                                yearCount[y] = (yearCount[y] || 0) + 1;
                            });

                            let archiveHtml = '';
                            let currentYear = '';

                            validPosts.forEach(post => {
                                let dObj = post.date ? new Date(String(post.date).replace(/-/g, '/')) : null;
                                const isValid = dObj && !isNaN(dObj.getTime());

                                const postYear = isValid ? String(dObj.getFullYear()) : '未標示年份';
                                const postDateStr = isValid
                                    ? `${dObj.getFullYear()}-${String(dObj.getMonth()+1).padStart(2,'0')}-${String(dObj.getDate()).padStart(2,'0')}`
                                    : '';

                                // 年份分隔標題（含文章總數）
                                if (postYear !== currentYear) {
                                    if (currentYear !== '') archiveHtml += '</div>';
                                    archiveHtml += `<h2 class="archive-year">${postYear}<span class="archive-year-count"> -- ${yearCount[postYear]} 篇文章</span></h2><div class="archive-card-list">`;
                                    currentYear = postYear;
                                }

                                const targetUrl = `article.html?file=${post.file}`;

                                // 圖片區塊
                                const imgHtml = post.image
                                    ? `<div class="archive-card-img">
                                           <a href="${targetUrl}">
                                               <img src="${post.image}" alt="${post.title || ''}" loading="lazy"
                                                    onerror="this.parentElement.parentElement.style.display='none'">
                                           </a>
                                       </div>`
                                    : '';

                                // 分類 badge
                                const cats = post.categories || [];
                                const catBadges = cats.map(c =>
                                    `<span class="archive-cat-badge">${c}</span>`
                                ).join('');

                                // 摘要
                                const excerptHtml = post.excerpt
                                    ? `<p class="archive-card-excerpt">${post.excerpt}</p>`
                                    : '';

                                archiveHtml += `
                                    <article class="archive-card">
                                        ${imgHtml}
                                        <div class="archive-card-body">
                                            <h3 class="archive-card-title">
                                                <a href="${targetUrl}">${post.title || post.file}</a>
                                            </h3>
                                            <div class="archive-card-meta">
                                                ${postDateStr ? `<span class="archive-card-date">📅 ${postDateStr}</span>` : ''}
                                                <span class="archive-card-cats">${catBadges}</span>
                                            </div>
                                            ${excerptHtml}
                                            <a href="${targetUrl}" class="read-more">繼續閱讀 »</a>
                                        </div>
                                    </article>
                                `;
                            });

                            if (currentYear !== '') archiveHtml += '</div>';
                            contentDiv.innerHTML = archiveHtml;
                        }

                    } else if (fileName) {
                        contentDiv.classList.add('markdown-body');
                        fetch(`./markdowns/${fileName}.md`)
                            .then(response => {
                                if (!response.ok) throw new Error('找不到該文章，請確認網址或檔案是否存在。');
                                return response.text();
                            })
                            .then(markdownText => {
                                let cleanMd = markdownText;
                                cleanMd = cleanMd.replace(/^---[\s\S]+?---\n/, '');
                                if (window.currentPostIndex !== -1) {
                                    cleanMd = cleanMd.replace(/^\s*#\s+.+\n/, '');
                                }
                                contentDiv.innerHTML = marked.parse(cleanMd);
                            })
                            .catch(error => {
                                contentDiv.innerHTML = `<div class="status-msg error">
                                    <h3>載入失敗</h3>
                                    <p>${error.message}</p>
                                </div>`;
                            });
                    } else {
                        contentDiv.innerHTML = `<div class="status-msg">未指定文章，請從上方選單或首頁選擇文章閱讀。</div>`;
                    }
                });

            // ================= 搜尋功能與模態框邏輯 =================
            const searchModal = document.getElementById('search-modal');
            const searchInput = document.getElementById('search-input');
            const searchResults = document.getElementById('search-results');

            document.getElementById('open-search-btn').addEventListener('click', () => {
                searchModal.style.display = 'flex';
                searchInput.focus();
            });

            document.getElementById('close-search-btn').addEventListener('click', () => {
                searchModal.style.display = 'none';
            });

            // 關鍵字搜尋邏輯
            searchInput.addEventListener('input', function() {
                const keyword = this.value.trim().toLowerCase();
                searchResults.innerHTML = '';
                
                if (keyword === '') {
                    searchResults.innerHTML = '<div style="color: var(--text-muted); font-size: 0.95rem; text-align: center;">請在上方輸入關鍵字開始搜尋</div>';
                    return;
                }

                const filtered = allArticlesForSearch.filter(post => {
                    const titleMatch = post.title && post.title.toLowerCase().includes(keyword);
                    const descMatch = post.description && post.description.toLowerCase().includes(keyword);
                    return titleMatch || descMatch;
                });

                if (filtered.length === 0) {
                    searchResults.innerHTML = '<div style="color: #ef4444; font-size: 0.95rem; text-align: center;">找不到符合的文章，請換個關鍵字試試。</div>';
                    return;
                }

                filtered.forEach(post => {
                    let dateStr = '';
                    if (post.date) {
                        let dObj = new Date(String(post.date).replace(/-/g, '/'));
                        if (!isNaN(dObj.getTime())) dateStr = `${dObj.getFullYear()}-${String(dObj.getMonth()+1).padStart(2,'0')}-${String(dObj.getDate()).padStart(2,'0')} • `;
                    }

                    const div = document.createElement('div');
                    div.className = 'search-result-item';
                    div.innerHTML = `
                        <a href="article.html?file=${post.file}" class="search-result-title">${post.title}</a>
                        <div class="search-result-meta">${dateStr}${post.description ? post.description.substring(0, 40) + '...' : '點擊閱讀完整文章'}</div>
                    `;
                    searchResults.appendChild(div);
                });
            });


            // ================= 個人化外觀設定邏輯 =================
            const settingsModal = document.getElementById('settings-modal');
            const bgColorInput = document.getElementById('set-bg-color');
            const textColorInput = document.getElementById('set-text-color');
            const fontSizeInput = document.getElementById('set-font-size');
            const fontSizeVal = document.getElementById('font-size-val');
            const fontFamilyInput = document.getElementById('set-font-family');

            // 開啟與關閉設定框
            document.getElementById('open-settings-btn').addEventListener('click', () => {
                // 載入目前設定值顯示在 UI 上
                const curTheme = localStorage.getItem('site_theme') || 'dark';
                const curDefaults = curTheme === 'light' ? LIGHT_DEFAULTS : DARK_DEFAULTS;
                bgColorInput.value = localStorage.getItem('site_bg') || curDefaults.bg;
                textColorInput.value = localStorage.getItem('site_color') || curDefaults.text;
                // 更新主題按鈕的 active 狀態
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === curTheme));

                fontSizeInput.value = localStorage.getItem('site_fsize') || '16';
                fontSizeVal.textContent = fontSizeInput.value + 'px';

                fontFamilyInput.value = localStorage.getItem('site_ffamily') || '';

                settingsModal.style.display = 'flex';
            });

            document.getElementById('close-settings-btn').addEventListener('click', () => {
                settingsModal.style.display = 'none';
            });

            // 監聽設定變更並即時套用與儲存
            bgColorInput.addEventListener('input', (e) => {
                document.documentElement.style.setProperty('--bg-color', e.target.value);
                document.body.style.setProperty('--bg-color', e.target.value);
                localStorage.setItem('site_bg', e.target.value);
            });

            textColorInput.addEventListener('input', (e) => {
                document.documentElement.style.setProperty('--text-main', e.target.value);
                document.body.style.setProperty('--text-main', e.target.value);
                localStorage.setItem('site_color', e.target.value);
            });

            fontSizeInput.addEventListener('input', (e) => {
                const size = e.target.value;
                fontSizeVal.textContent = size + 'px';
                document.documentElement.style.fontSize = size + 'px';
                localStorage.setItem('site_fsize', size);
            });

            fontFamilyInput.addEventListener('change', (e) => {
                const font = e.target.value;
                document.body.style.fontFamily = font;
                localStorage.setItem('site_ffamily', font);
            });

            // 深色/淺色主題切換
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    localStorage.setItem('site_theme', theme);
                    localStorage.removeItem('site_bg');
                    localStorage.removeItem('site_color');
                    applyUserSettings();
                    const defs = theme === 'light' ? LIGHT_DEFAULTS : DARK_DEFAULTS;
                    bgColorInput.value = defs.bg;
                    textColorInput.value = defs.text;
                    document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
                });
            });

            // 點擊背景可關閉模態框
            window.addEventListener('click', (e) => {
                if (e.target === searchModal) searchModal.style.display = 'none';
                if (e.target === settingsModal) settingsModal.style.display = 'none';
            });

            // 還原預設值 (回到深色模式)
            document.getElementById('reset-settings-btn').addEventListener('click', () => {
                localStorage.removeItem('site_bg');
                localStorage.removeItem('site_color');
                localStorage.removeItem('site_fsize');
                localStorage.removeItem('site_ffamily');
                localStorage.removeItem('site_theme');
                applyUserSettings();
                bgColorInput.value = DARK_DEFAULTS.bg;
                textColorInput.value = DARK_DEFAULTS.text;
                fontSizeInput.value = '16';
                fontSizeVal.textContent = '16px';
                fontFamilyInput.value = '';
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === 'dark'));
                settingsModal.style.display = 'none';
            });
        });
    </script>
</body>
</html>
