<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三語 Markdown 文章產生器</title>
    
    <!-- 載入 Tailwind CSS 進行排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 載入 React 核心庫 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 載入 Babel 用來在瀏覽器中即時編譯 React (JSX) 語法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    
    <!-- React 應用程式會被渲染在這個 div 裡面 -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
          // 您專屬的 SoundOn RSS
          const RSS_FEED_URL = 'https://feeds.soundon.fm/podcasts/7c6f4223-1e6f-4cad-86ca-48884313b43a.xml';
          const SOUNDON_PODCAST_ID = '7c6f4223-1e6f-4cad-86ca-48884313b43a';

          // --- State: RSS Episodes ---
          const [rssEpisodes, setRssEpisodes] = useState([]);
          const [isLoadingRss, setIsLoadingRss] = useState(false);
          const [rssError, setRssError] = useState('');
          
          // --- State: 手動解析備用機制 ---
          const [showManualRss, setShowManualRss] = useState(false);
          const [manualXmlText, setManualXmlText] = useState('');

          // --- State: Metadata ---
          const [meta, setMeta] = useState({
            title: '【英國童話故事台語版】三個傻瓜 |【英國囡仔古】三ê戇á',
            date: '2026-03-26T20:00',
            img: '/medias/featureimages/ukkidstory19.png',
            categories: '英國囡仔古',
            description: '台語廣播劇, 英國文學',
            tags: 'Tâi-gí, 台語, Tâi-bûn, 台文, Eng-kok gín-á-kó͘, 英國囡仔古, 3-ê gōng-á, 三ê戇á, 英國童話故事台語版, 三個傻瓜'
          });

          // --- State: Links ---
          const [links, setLinks] = useState({
            youtube: '',
            soundon: '',
            spotify: '',
            kkbox: '',
            apple: ''
          });

          // --- State: 智慧擷取暫存區 ---
          const [rawLinkText, setRawLinkText] = useState('');

          // --- State: Text Contents ---
          const [texts, setTexts] = useState({
            en: [],
            hanji: [],
            poj: []
          });

          const [output, setOutput] = useState('');
          const [filename, setFilename] = useState('new-article');
          const [savedName, setSavedName] = useState('');
          const [apiKey, setApiKey] = useState('');
          const [apiConnected, setApiConnected] = useState(false);
          const [apiStatus, setApiStatus] = useState('');
          const [postsJsonText, setPostsJsonText] = useState('');
          const [showPostsEditor, setShowPostsEditor] = useState(false);
          const [postsJsonSaved, setPostsJsonSaved] = useState(false);

          // 輔助函式：解析 XML 文字為 JSON 陣列
          const parseXmlText = (xmlText) => {
            if (!xmlText || typeof xmlText !== 'string') return [];
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
            if (xmlDoc.querySelector('parsererror')) return [];
            
            const items = Array.from(xmlDoc.querySelectorAll('item'));
            return items.map(item => ({
              title: item.querySelector('title')?.textContent || '',
              link: item.querySelector('link')?.textContent || '',
              pubDate: item.querySelector('pubDate')?.textContent || '',
              guid: item.querySelector('guid')?.textContent || item.querySelector('link')?.textContent,
            }));
          };

          // --- 自動抓取邏輯 ---
          const fetchRss = async () => {
            setIsLoadingRss(true);
            setRssError('');
            setShowManualRss(false);

            try {
              let parsedEpisodes = [];

              try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_FEED_URL)}&_t=${Date.now()}`);
                if (res.ok) {
                  const data = await res.json();
                  if (data.status === 'ok' && data.items && data.items.length > 0) {
                    parsedEpisodes = data.items.map(item => ({
                      title: item.title,
                      link: item.link,
                      pubDate: item.pubDate,
                      guid: item.guid || item.link
                    }));
                  }
                }
              } catch (e) {
                console.warn('rss2json fail:', e);
              }

              if (parsedEpisodes.length === 0) {
                try {
                  const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(RSS_FEED_URL)}&_t=${Date.now()}`);
                  if (res.ok) {
                     const text = await res.text();
                     parsedEpisodes = parseXmlText(text);
                  }
                } catch (e) {
                  console.warn('AllOrigins fetch fail:', e);
                }
              }

              if (parsedEpisodes.length > 0) {
                setRssEpisodes(parsedEpisodes);
              } else {
                setRssError('無法自動取得最新單集。可能原因：您的網路環境阻擋了連線，或 RSS 更新有延遲。請使用下方「手動備用機制」。');
                setShowManualRss(true);
              }
            } catch (error) {
              setRssError('發生未預期的錯誤，請使用手動備用機制。');
              setShowManualRss(true);
            }
            setIsLoadingRss(false);
          };

          // --- 手動解析邏輯 ---
          const handleParseManualXml = () => {
            if (!manualXmlText.trim()) {
              alert("請先貼上內容！");
              return;
            }
            const items = parseXmlText(manualXmlText);
            if (items && items.length > 0) {
              setRssEpisodes(items);
              setRssError('');
              setShowManualRss(false);
              setManualXmlText('');
            } else {
              alert("解析失敗，請確認您複製的內容是否完整 (必須包含 <rss> 或 <item> 標籤)。");
            }
          };

          // 選擇單集後自動填入資料
          const handleSelectEpisode = (e) => {
            const selectedItem = rssEpisodes.find(item => item.guid === e.target.value);
            if (!selectedItem) return;

            let formattedDate = '';
            try {
              const d = new Date(selectedItem.pubDate);
              formattedDate = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
            } catch (err) {
              formattedDate = meta.date;
            }

            setMeta(prev => ({
              ...prev,
              title: selectedItem.title,
              description: '台語廣播劇, 英國文學',
              date: formattedDate
            }));

            setLinks(prev => ({
              ...prev,
              soundon: selectedItem.link
            }));
          };

          // --- 智慧擷取網址邏輯 ---
          const extractLinks = () => {
            const extractUrl = (regex) => {
              const match = rawLinkText.match(regex);
              if (!match) return '';
              return match[0].replace(/[)"'>\]!,]+$/, '');
            };

            const newLinks = {
              youtube: extractUrl(/(https?:\/\/(?:[\w-]+\.)*(?:youtube\.com|youtu\.be)[^\s"'>\])]*)/i),
              soundon: extractUrl(/(https?:\/\/(?:[\w-]+\.)*(?:soundon\.fm|sndn\.link)[^\s"'>\])]*)/i),
              spotify: extractUrl(/(https?:\/\/(?:[\w-]+\.)*(?:spotify\.com|spoti\.fi)[^\s"'>\])]*)/i),
              kkbox: extractUrl(/(https?:\/\/(?:[\w-]+\.)*(?:kkbox\.com|kkbox\.fm)[^\s"'>\])]*)/i),
              apple: extractUrl(/(https?:\/\/(?:[\w-]+\.)*(?:apple\.com|apple\.co|itunes\.apple\.com)[^\s"'>\])]*)/i)
            };

            setLinks(prevLinks => ({
              ...prevLinks,
              youtube: newLinks.youtube || prevLinks.youtube,
              soundon: newLinks.soundon || prevLinks.soundon,
              spotify: newLinks.spotify || prevLinks.spotify,
              kkbox: newLinks.kkbox || prevLinks.kkbox,
              apple: newLinks.apple || prevLinks.apple,
            }));
            
            setRawLinkText('');
          };

          // 處理文字檔上傳
          const handleFileUpload = (e, lang) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
              const content = event.target.result;
              const paragraphs = content.split(/\r?\n\r?\n|\r?\n/).filter(p => p.trim() !== '');
              setTexts(prev => ({ ...prev, [lang]: paragraphs }));
            };
            reader.readAsText(file);
          };

          // 清除已上傳的檔案
          const handleClearFile = (lang) => {
            setTexts(prev => ({ ...prev, [lang]: [] }));
            const el = document.getElementById(`file-${lang}`);
            if (el) el.value = '';
          };

          const API_URL = './api.php';

          // 步驟一：連線並讀取伺服器上的 posts.json
          const connectApi = async () => {
            if (!apiKey.trim()) { setApiStatus('❌ 請先輸入金鑰'); return; }
            setApiStatus('連線中...');
            try {
              const res = await fetch(`${API_URL}?action=read_posts&key=${encodeURIComponent(apiKey)}`);
              const json = await res.json();
              if (json.ok) {
                setPostsJsonText(json.content);
                setApiConnected(true);
                setApiStatus('✅ 已連線，posts.json 載入成功');
                setShowPostsEditor(false);
                setSavedName('');
              } else {
                setApiStatus(`❌ ${json.error}`);
              }
            } catch (e) {
              setApiStatus('❌ 無法連線到 api.php，請確認檔案已上傳');
            }
          };

          // 步驟二：直接儲存 markdown 到伺服器的 markdowns/ 資料夾
          const saveFile = async () => {
            if (!output) return;
            if (!apiConnected) { alert('請先完成步驟一（連線）再儲存'); return; }
            const fname = (filename.trim() || 'new-article').replace(/\.md$/i, '') + '.md';
            const fileKey = fname.replace(/\.md$/i, '');

            try {
              const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'save_markdown', key: apiKey, filename: fileKey, content: output })
              });
              const json = await res.json();
              if (json.ok) {
                setSavedName(fname);
                setPostsJsonSaved(false);
                // 自動把新檔名加入 posts.json 的 files 陣列
                try {
                  const parsed = JSON.parse(postsJsonText);
                  if (Array.isArray(parsed.files) && !parsed.files.includes(fileKey)) {
                    parsed.files.push(fileKey);
                    setPostsJsonText(JSON.stringify(parsed, null, 2));
                  }
                } catch(e) {}
                setShowPostsEditor(true);
              } else {
                alert('儲存失敗：' + json.error);
              }
            } catch (e) {
              alert('連線錯誤：' + e.message);
            }
          };

          // 步驟三：直接更新伺服器上的 posts.json
          const savePostsJson = async () => {
            if (!postsJsonText || !apiConnected) return;
            try {
              const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'save_posts', key: apiKey, content: postsJsonText })
              });
              const json = await res.json();
              if (json.ok) {
                setPostsJsonSaved(true);
              } else {
                alert('儲存失敗：' + json.error);
              }
            } catch (e) {
              alert('連線錯誤：' + e.message);
            }
          };

          // 產生 Markdown
          const generateMarkdown = () => {
            const formattedDate = meta.date.replace('T', ' ') + ':00';
            const tagsArray = meta.tags.split(',').map(t => t.trim()).filter(t => t);

            let md = `---
title: ${meta.title}
date: ${formattedDate}
img: ${meta.img}
categories: [${meta.categories}]
description: ${meta.description}
tags:\n`;
            
            tagsArray.forEach(tag => {
              md += `- ${tag}\n`;
            });
            md += `---\n\n`;

            let linkStr = '';
            if (links.youtube) linkStr += `[<i class="fab fa-youtube fa-2x" aria-hidden="true"></i>](${links.youtube} "YouTube Podcast")　`;
            if (links.soundon) linkStr += `[<i class="fa fa-podcast fa-2x" aria-hidden="true"></i>](${links.soundon} "SoundOn")　`;
            if (links.spotify) linkStr += `[<i class="fab fa-spotify fa-2x" aria-hidden="true"></i>](${links.spotify} "Spotify")　`;
            if (links.kkbox) linkStr += `[<i class="fa fa-podcast fa-2x" aria-hidden="true"></i>](${links.kkbox} "KKBOX")　`;
            if (links.apple) linkStr += `[<i class="fab fa-apple fa-2x" aria-hidden="true"></i>](${links.apple} "Apple Podcast")`;
            
            if (linkStr) {
              md += `${linkStr.trim()}\n\n---\n\n`;
            }

            const maxLen = Math.max(texts.en.length, texts.hanji.length, texts.poj.length);

            for (let i = 0; i < maxLen; i++) {
              const size = i === 0 ? '6' : '5'; 
              if (texts.en[i]) md += `<font size=${size} color=#3F48CC>${texts.en[i]}</font>\n<br>\n\n`;
              if (texts.hanji[i]) md += `<font size=${size}>${texts.hanji[i]}</font>\n<br>\n\n`;
              if (texts.poj[i]) md += `<font size=${size} color=#8E403A>${texts.poj[i]}</font>\n<br>\n\n`;
              md += `\n`; 
            }

            setOutput(md);
            setSavedName('');

            // 從圖片路徑自動建議檔名（例：/medias/featureimages/ukkidstory19.png → ukkidstory19）
            if (meta.img) {
              const base = meta.img.split('/').pop().replace(/\.[^.]+$/, '');
              if (base) setFilename(base);
            }
          };

          const downloadFile = () => {
            if (!output) return;
            const blob = new Blob([output], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'generated_story.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          };

          return (
            <div className="min-h-screen p-8 font-sans text-gray-800">
              <div className="max-w-5xl mx-auto space-y-8">
                <h1 className="text-3xl font-bold text-indigo-700">三語 Markdown 文章產生器</h1>
                <p className="text-gray-600">請填寫文章資訊，並上傳包含各自段落的 3 個 `.txt` 文字檔，程式將為您自動排版產生 Hexo 格式的 Markdown 檔案。</p>

                {/* --- SoundOn RSS 自動/手動載入區塊 --- */}
                <div className="bg-gradient-to-r from-orange-50 to-orange-100 p-6 rounded-xl shadow-sm border border-orange-200">
                  <div className="flex items-center justify-between mb-2">
                    <h2 className="text-lg font-bold text-orange-800 flex items-center gap-2">
                      <span className="text-2xl">🎙️</span> 從 SoundOn 快速匯入
                    </h2>
                    <button 
                      onClick={fetchRss} 
                      disabled={isLoadingRss}
                      className="bg-orange-500 hover:bg-orange-600 text-white text-sm font-semibold py-2 px-4 rounded shadow transition disabled:opacity-50"
                    >
                      {isLoadingRss ? '連線中...' : '自動讀取最新單集'}
                    </button>
                  </div>
                  
                  {rssError && <p className="text-red-600 text-sm mb-2 font-medium">{rssError}</p>}
                  
                  {/* --- 終極防線：手動複製貼上區塊 --- */}
                  {showManualRss && (
                    <div className="mt-3 p-4 bg-white border border-red-300 rounded-lg shadow-sm">
                      <p className="text-sm text-red-700 font-bold mb-2 flex items-center gap-1">
                        <span>⚠️</span> 啟動手動解析備用機制：
                      </p>
                      <ol className="list-decimal ml-5 text-sm text-gray-700 mb-3 space-y-1">
                        <li>請點擊開啟：<a href={RSS_FEED_URL} target="_blank" rel="noreferrer" className="text-blue-600 underline font-medium hover:text-blue-800">專屬 SoundOn RSS 網頁</a></li>
                        <li>在彈出的網頁中按 <kbd className="bg-gray-100 border px-1 rounded">Ctrl</kbd> + <kbd className="bg-gray-100 border px-1 rounded">A</kbd> (全選) 並複製所有內容。</li>
                        <li>回到這裡，貼到下方文字框中，點擊「解析貼上的內容」。</li>
                      </ol>
                      <textarea 
                        className="w-full border border-gray-300 rounded p-2 text-xs font-mono h-20 mb-2 focus:ring-red-500 focus:border-red-500" 
                        placeholder="請在此貼上複製的 RSS 原始碼..."
                        value={manualXmlText}
                        onChange={e => setManualXmlText(e.target.value)}
                      />
                      <button 
                        onClick={handleParseManualXml}
                        className="bg-red-600 hover:bg-red-700 text-white text-sm py-1.5 px-4 rounded shadow transition"
                      >
                        解析貼上的內容
                      </button>
                    </div>
                  )}

                  {/* 單集下拉選單 */}
                  {rssEpisodes.length > 0 && (
                    <div className="mt-4 border-t border-orange-200 pt-4">
                      <label className="block text-sm font-medium text-orange-900 mb-1">
                        🎉 解析成功！請選擇要發布的單集：
                      </label>
                      <select 
                        onChange={handleSelectEpisode} 
                        defaultValue=""
                        className="w-full border-orange-300 rounded p-2 text-sm shadow-sm focus:ring-orange-500 focus:border-orange-500 bg-white"
                      >
                        <option value="" disabled>-- 請選擇單集 --</option>
                        {rssEpisodes.map((ep, index) => (
                          <option key={ep.guid} value={ep.guid}>
                            {ep.title} ({ep.pubDate.split(' ')[0]})
                          </option>
                        ))}
                      </select>
                      <p className="text-xs text-orange-600 mt-2">選擇後將自動為您填寫下方的「標題」、「日期」與「SoundOn 網址」。</p>
                    </div>
                  )}
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {/* Metadata 區塊 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 className="text-xl font-semibold mb-4 border-b pb-2">1. 基礎設定 (Front Matter)</h2>
                    <div className="space-y-3">
                      <div>
                        <label className="block text-sm font-medium mb-1">標題 (Title)</label>
                        <input type="text" className="w-full border rounded p-2 text-sm" value={meta.title} onChange={e => setMeta({...meta, title: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-medium mb-1">日期 (Date)</label>
                        <input type="datetime-local" className="w-full border rounded p-2 text-sm" value={meta.date} onChange={e => setMeta({...meta, date: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-medium mb-1">圖片路徑 (Image Path)</label>
                        <input type="text" className="w-full border rounded p-2 text-sm" value={meta.img} onChange={e => setMeta({...meta, img: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-medium mb-1">分類 (Category)</label>
                        <input type="text" className="w-full border rounded p-2 text-sm" value={meta.categories} onChange={e => setMeta({...meta, categories: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-medium mb-1">描述 (Description)</label>
                        <input type="text" className="w-full border rounded p-2 text-sm" value={meta.description} onChange={e => setMeta({...meta, description: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-medium mb-1">標籤 (Tags, 請用半形逗號分隔)</label>
                        <textarea className="w-full border rounded p-2 text-sm h-20" value={meta.tags} onChange={e => setMeta({...meta, tags: e.target.value})} />
                      </div>
                    </div>
                  </div>

                  <div className="space-y-6">
                    {/* Podcast 區塊 */}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                      <h2 className="text-xl font-semibold mb-4 border-b pb-2">2. Podcast 連結</h2>
                      
                      <div className="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                        <label className="block text-sm font-bold text-blue-800 mb-1">⚡ 智慧擷取工具</label>
                        <p className="text-xs text-blue-600 mb-2">直接貼上包含多個平台網址的文案，系統將為您自動分類填入其它欄位。</p>
                        <div className="flex gap-2">
                          <textarea 
                            className="flex-1 border border-blue-300 rounded p-2 text-sm h-12 resize-none" 
                            placeholder="例：YT: https://youtu.be/xxx Spotify: https://spoti.fi/..."
                            value={rawLinkText} 
                            onChange={e => setRawLinkText(e.target.value)} 
                          />
                          <button 
                            onClick={extractLinks}
                            className="bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-4 rounded transition"
                          >
                            一鍵擷取
                          </button>
                        </div>
                      </div>

                      <div className="space-y-3">
                        {Object.keys(links).map((platform) => (
                          <div key={platform} className="flex items-center">
                            <label className="w-24 text-sm font-medium capitalize">{platform}</label>
                            <input type="text" className="flex-1 border rounded p-2 text-sm" placeholder="https://" value={links[platform]} onChange={e => setLinks({...links, [platform]: e.target.value})} />
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* 文字檔上傳區塊 */}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                      <h2 className="text-xl font-semibold mb-4 border-b pb-2">3. 內文檔案 (.txt)</h2>
                      <p className="text-xs text-red-500 mb-3">*您可以依需求上傳 1 到 3 個檔案（皆為選填）。若上傳多個，請確保它們的「段落數量」一致，第一段會被設定為標題字體大小。</p>
                      <div className="space-y-4">
                        <div className="bg-gray-50 p-3 rounded border">
                          <div className="flex justify-between items-center mb-2">
                            <label className="block text-sm font-bold text-blue-700">英文內容 (English)</label>
                            {texts.en.length > 0 && <button onClick={() => handleClearFile('en')} className="text-xs bg-red-100 text-red-600 px-2 py-1 rounded hover:bg-red-200 transition">移除檔案</button>}
                          </div>
                          <input id="file-en" type="file" accept=".txt" onChange={(e) => handleFileUpload(e, 'en')} className="text-sm w-full mb-1" />
                          <div className="text-xs text-gray-500">{texts.en.length > 0 ? `✅ 已讀取 ${texts.en.length} 段` : '尚未上傳'}</div>
                        </div>
                        
                        <div className="bg-gray-50 p-3 rounded border">
                          <div className="flex justify-between items-center mb-2">
                            <label className="block text-sm font-bold text-black">台語漢字</label>
                            {texts.hanji.length > 0 && <button onClick={() => handleClearFile('hanji')} className="text-xs bg-red-100 text-red-600 px-2 py-1 rounded hover:bg-red-200 transition">移除檔案</button>}
                          </div>
                          <input id="file-hanji" type="file" accept=".txt" onChange={(e) => handleFileUpload(e, 'hanji')} className="text-sm w-full mb-1" />
                          <div className="text-xs text-gray-500">{texts.hanji.length > 0 ? `✅ 已讀取 ${texts.hanji.length} 段` : '尚未上傳'}</div>
                        </div>
                        
                        <div className="bg-gray-50 p-3 rounded border">
                          <div className="flex justify-between items-center mb-2">
                            <label className="block text-sm font-bold text-red-800">台語白話字 (POJ)</label>
                            {texts.poj.length > 0 && <button onClick={() => handleClearFile('poj')} className="text-xs bg-red-100 text-red-600 px-2 py-1 rounded hover:bg-red-200 transition">移除檔案</button>}
                          </div>
                          <input id="file-poj" type="file" accept=".txt" onChange={(e) => handleFileUpload(e, 'poj')} className="text-sm w-full mb-1" />
                          <div className="text-xs text-gray-500">{texts.poj.length > 0 ? `✅ 已讀取 ${texts.poj.length} 段` : '尚未上傳'}</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* 步驟一：連線 */}
                <div className={`p-5 rounded-xl border-2 ${apiConnected ? 'bg-green-50 border-green-300' : 'bg-yellow-50 border-yellow-300'}`}>
                  <p className="font-bold text-gray-700 mb-3">
                    {apiConnected ? '🔗 已連線到伺服器' : '⚠️ 步驟一：輸入金鑰連線'}
                  </p>
                  <div className="flex gap-2 items-center">
                    <input
                      type="password"
                      className="flex-1 border rounded p-2 text-sm"
                      placeholder="輸入 api.php 裡設定的金鑰"
                      value={apiKey}
                      onChange={e => setApiKey(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && connectApi()}
                    />
                    <button
                      onClick={connectApi}
                      className="whitespace-nowrap bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded shadow transition"
                    >
                      {apiConnected ? '🔄 重新連線' : '🔌 連線'}
                    </button>
                  </div>
                  {apiStatus && (
                    <p className="text-sm mt-2 text-gray-600">{apiStatus}</p>
                  )}
                </div>

                {/* 產生按鈕與結果 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                  <button
                    onClick={generateMarkdown}
                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded transition duration-200 mb-4"
                  >
                    產生 Markdown
                  </button>

                  <textarea
                    className="w-full border rounded p-4 font-mono text-sm bg-gray-50 h-96"
                    readOnly
                    value={output}
                    placeholder="點擊產生按鈕後，這裡會顯示 Markdown 原始碼..."
                  ></textarea>

                  <div className="mt-4 space-y-3">
                    {/* 檔名設定 */}
                    <div className="flex items-center gap-2">
                      <label className="text-sm font-semibold whitespace-nowrap text-gray-700">檔案名稱</label>
                      <div className="flex flex-1 items-center gap-1 font-mono text-sm">
                        <span className="text-gray-400">markdowns/</span>
                        <input
                          type="text"
                          className="flex-1 border rounded p-2 focus:ring-2 focus:ring-green-400 focus:border-green-400"
                          value={filename}
                          onChange={e => setFilename(e.target.value.replace(/\.md$/i, '').replace(/[^a-zA-Z0-9_\-]/g, ''))}
                          placeholder="輸入英文檔名"
                        />
                        <span className="text-gray-500">.md</span>
                      </div>
                    </div>

                    {/* 主要儲存按鈕 */}
                    <button
                      onClick={saveFile}
                      disabled={!output}
                      className={`w-full font-bold py-3 px-4 rounded transition duration-200 flex items-center justify-center gap-2 text-lg ${output ? 'bg-green-600 hover:bg-green-700 text-white shadow' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                    >
                      💾 儲存到 markdowns/ 資料夾
                    </button>

                    {/* 存檔成功提示 */}
                    {savedName && (
                      <div className="bg-green-50 border border-green-300 rounded-lg p-3 text-sm text-green-800">
                        ✅ 已儲存到伺服器：<code className="font-mono font-bold">markdowns/{savedName}</code>
                      </div>
                    )}

                    <p className="text-xs text-gray-400 text-center">
                      {apiConnected ? '儲存後請記得也更新 posts.json（步驟三）' : '請先完成步驟一（連線）'}
                    </p>
                  </div>
                </div>

                {/* 步驟三：posts.json 編輯器 */}
                {showPostsEditor && (
                  <div className="bg-white p-6 rounded-xl shadow-sm border-2 border-indigo-300">
                    <h2 className="text-xl font-bold mb-1 text-indigo-800">📋 步驟三：更新 posts.json</h2>
                    <p className="text-sm text-gray-500 mb-3">
                      {apiConnected
                        ? <><code className="bg-indigo-50 px-1 rounded font-mono font-bold">{savedName.replace(/\.md$/i, '')}</code> 已自動加入 files 陣列，確認內容後按下方按鈕直接更新到伺服器。</>
                        : '（若已完成步驟一，這裡會顯示自動更新後的內容）'}
                    </p>
                    {apiConnected && (
                      <>
                        <textarea
                          className="w-full border rounded p-3 font-mono text-xs bg-gray-50 h-64 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400"
                          value={postsJsonText}
                          onChange={e => { setPostsJsonText(e.target.value); setPostsJsonSaved(false); }}
                        />
                        <button
                          onClick={savePostsJson}
                          className="mt-3 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded transition"
                        >
                          💾 儲存 posts.json 到伺服器
                        </button>
                        {postsJsonSaved && (
                          <p className="mt-2 text-center text-green-700 font-semibold">✅ posts.json 已更新到伺服器！重新整理網站即可看到新文章。</p>
                        )}
                      </>
                    )}
                    {!apiConnected && (
                      <p className="text-sm text-amber-600 bg-amber-50 border border-amber-200 rounded p-3">
                        ⚠️ 請先完成步驟一（連線），才能更新 posts.json。
                      </p>
                    )}
                  </div>
                )}

              </div>
            </div>
          );
        }

        // 啟動 React 應用程式
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
